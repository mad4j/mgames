<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" href="/icon-64x64.png" />
    <title>mgames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100%; overflow-x: hidden; background-color: #ffffff; }
      #root { width: 100%; min-height: 100%; }
      @media (max-width: 480px) {
        .game-area {
          max-width: calc(100vw - 8px) !important;
          max-height: calc(100dvh - 8px) !important;
          outline: none !important;
        }
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
